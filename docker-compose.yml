services:
  bot:
    build: .
    image: discord-transcriber:latest
    container_name: discord-transcriber
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./recordings:/app/recordings
      - ./config.yaml:/app/config.yaml:ro
      - whisper-models:/root/.cache/huggingface
      - skryba-ipc:/tmp/skryba
    depends_on:
      - recorder
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  recorder:
    build: ./recorder
    image: discord-transcriber-recorder:latest
    container_name: discord-transcriber-recorder
    restart: unless-stopped
    env_file: ./recorder/.env
    environment:
      IPC_SOCKET: /tmp/skryba/recorder.sock
    volumes:
      # Same on-disk location as the bot so per-user .pcm files appear
      # at the path the bot expects.
      - ./recordings:/app/recordings
      - skryba-ipc:/tmp/skryba

  # Uncomment if you set summarizer.backend: ollama in config.yaml.
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: discord-transcriber-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

volumes:
  whisper-models:
  skryba-ipc:
