whisper:
  model: large-v3
  device: cuda          # cuda | cpu
  compute_type: float16 # float16 on GPU, int8 on CPU
  language: pl

summarizer:
  backend: claude       # claude | openai | ollama
  claude:
    model: claude-sonnet-4-6
    max_tokens: 4096
  openai:
    model: gpt-4o
    max_tokens: 4096
  ollama:
    host: http://localhost:11434
    model: qwen3.5:9b

recording:
  output_dir: ./recordings
  # Audio file lifecycle:
  #   recording → posted: .pcm files always kept (recovery anchor)
  #   posted:             .pcm always deleted (silence-padded; bulky)
  #   posted:             .wav kept iff keep_audio: true (this flag)
  #
  # With keep_audio: true the per-session resting cost is just the small
  # 16 kHz mono WAV (~1.9 MB/min × speakers). Set to false if you don't
  # want to retain anything after the summary lands.
  keep_audio: true
  # No-audio watchdog: if the recorder receives no decoded frames from anyone
  # for this long, it reports a hard failure and the session is finalized on
  # whatever PCM was captured.
  idle_timeout_s: 300
  heartbeat_interval_s: 10
  heartbeat_stale_after_s: 60

reliability:
  summarizer_retries: 5
  summarizer_backoff_max_s: 60
  post_retries: 5

recorder:
  # Unix-socket path to the Node sidecar. Must match IPC_SOCKET in
  # docker-compose.yml and be mounted into both containers.
  socket_path: /tmp/skryba/recorder.sock
  # Keep strictly above the recorder's READY_TIMEOUT_MS (15s) + fetch overhead.
  join_timeout_s: 30.0
  leave_timeout_s: 15.0
